spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/fashion_eshop?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        use_sql_comments: true

  application:
    name: fashion-eshop

server:
  port: 8080
  servlet:
    context-path:

logging:
  level:
    root: INFO
    com.eshop: DEBUG
